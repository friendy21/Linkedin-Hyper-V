version: '3.8'

services:
  # PostgreSQL database for persistent storage
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linkedinuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: linkedin_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkedinuser -d linkedin_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - linkedin-network

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - linkedin-network

  # noVNC server for remote browser viewing
  novnc:
    image: jitesoft/novnc:latest
    environment:
      - VNC_SERVER=worker:5900
      - VNC_PORT=5900
      - AUTOCONNECT=true
      - RESIZE=scale
    ports:
      - "8080:8080"
    depends_on:
      - worker
    networks:
      - linkedin-network
    restart: always

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    shm_size: '2gb'
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql://linkedinuser:${DB_PASSWORD}@postgres:5432/linkedin_db
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - API_SECRET=${API_SECRET}
      - PROXY_URL=${PROXY_URL}
      - MAX_CONCURRENT_BROWSERS=${MAX_CONCURRENT_BROWSERS:-5}
      - VNC_PORT=5900
      - DISPLAY=:99
    volumes:
      - worker_profiles:/app/profiles
      - /dev/shm:/dev/shm
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - linkedin-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://worker:3001
      - API_SECRET=${API_SECRET}
      - DATABASE_URL=postgresql://linkedinuser:${DB_PASSWORD}@postgres:5432/linkedin_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-86400}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    depends_on:
      worker:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - linkedin-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  worker_profiles:
    driver: local

networks:
  linkedin-network:
    driver: bridge
