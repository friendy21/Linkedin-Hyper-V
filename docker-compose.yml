version: '3.8'

services:
  redis:
    image: redis:alpine
    # FIXED: added requirepass — never run Redis without auth in production
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # FIXED: removed host port exposure — Redis must be internal only
    # ports: - "6379:6379"   ← do NOT expose Redis to host
    restart: always

  worker:
    build:
      context: ./worker
    shm_size: '1gb'   # NON-NEGOTIABLE — Chrome uses /dev/shm
    environment:
      # FIXED: added all 3 Redis vars (worker reads these separately, NOT REDIS_URL)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # FIXED: added SESSION_ENCRYPTION_KEY — fatal throw without it
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - ACCOUNT_IDS=${ACCOUNT_IDS}
      - API_SECRET=${API_SECRET}
      - PROXY_URL=${PROXY_URL}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      # FIXED: API_URL points to internal worker hostname
      - API_URL=http://worker:3001
      - API_SECRET=${API_SECRET}
      - PROXY_AUTH_TOKENS=${PROXY_AUTH_TOKENS}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - worker
    restart: always
